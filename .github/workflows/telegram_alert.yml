name: KQ VVIX Daily Alert

on:
  schedule:
    # Esegue dal lunedì al venerdì alle 22:30 UTC 
    # (Corrisponde alle 17:30 / 18:30 Eastern Time a seconda dell'ora legale)
    - cron: '30 22 * * 1-5'
  workflow_dispatch: # Permette di avviare l'azione manualmente da GitHub

jobs:
  run-alert:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Telegram Alert Script
      env:
        EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python telegram_alert.py
